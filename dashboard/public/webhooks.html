<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Webhook Configuration | Payment Dashboard</title>

    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 260px;
            height: 100vh;
            background: #1e293b;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .sidebar h1 {
            font-size: 20px;
            color: #6366f1;
            margin-bottom: 40px;
        }

        .sidebar nav a {
            display: block;
            padding: 12px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .sidebar nav a.active {
            background: #334155;
            color: white;
        }

        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #334155;
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
        }

        h3 {
            margin-top: 40px;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
        }

        .btn {
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: #6366f1;
            color: white;
        }

        .btn-secondary {
            background: #334155;
            color: white;
            margin-left: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            border-bottom: 2px solid #334155;
            color: #94a3b8;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #334155;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-success {
            background: #065f46;
            color: #34d399;
        }

        .status-failed {
            background: #7f1d1d;
            color: #f87171;
        }

        .status-pending {
            background: #713f12;
            color: #fbbf24;
        }

        .secret-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        code {
            background: #0f172a;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #334155;
            flex: 1;
            word-break: break-all;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #065f46;
            color: #34d399;
        }

        .alert-error {
            background: #7f1d1d;
            color: #f87171;
        }
    </style>
</head>


<body>

    <div class="sidebar">
        <h1>Payment Gateway</h1>

        <nav>
            <a href="/dashboard/docs">Documentation</a>
            <a href="/dashboard/webhooks" class="active">Webhooks</a>
        </nav>
    </div>


    <div class="main">

        <div data-test-id="webhook-config">

            <h2>Webhook Configuration</h2>

            <div class="card">

                <div id="alert-container"></div>

                <form onsubmit="return saveConfig(event)">

                    <div class="form-group">
                        <label>Webhook URL</label>
                        <input id="webhook-url" type="url" placeholder="https://yoursite.com/webhook">
                    </div>

                    <div class="form-group">
                        <label>Webhook Secret</label>

                        <div class="secret-container">

                            <code id="webhook-secret">Loading...</code>

                            <button type="button" class="btn btn-secondary" onclick="regenerateSecret()">
                                Regenerate
                            </button>

                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        Save Configuration
                    </button>

                    <button type="button" class="btn btn-secondary" onclick="sendTestWebhook()">
                        Send Test Webhook
                    </button>

                </form>

            </div>


            <h3>Webhook Logs</h3>

            <div class="card" style="padding:0;overflow-x:auto;">

                <table>

                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Status</th>
                            <th>Attempts</th>
                            <th>Last Attempt</th>
                            <th>Response Code</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="webhook-logs-body">

                        <tr>
                            <td colspan="6" style="text-align:center;color:#94a3b8">
                                Loading...
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>


    <script>

        const API_BASE = 'http://localhost:8000/api/v1'

        const HEADERS = {
            'X-Api-Key': 'key_test_abc123',
            'X-Api-Secret': 'secret_test_xyz789',
            'Content-Type': 'application/json'
        }


        function showAlert(message, type = 'success') {

            const container = document.getElementById('alert-container')

            const alert = document.createElement('div')

            alert.className = `alert alert-${type}`

            alert.textContent = message

            container.innerHTML = ''

            container.appendChild(alert)

            setTimeout(() => alert.remove(), 4000)

        }



        async function loadConfig() {

            try {

                const res = await fetch(`${API_BASE}/merchants/me`, { headers: HEADERS })

                const merchant = await res.json()

                document.getElementById('webhook-url').value = merchant.webhook_url || ''

                document.getElementById('webhook-secret').innerText = merchant.webhook_secret || 'Not set'

            } catch (e) {

                showAlert('Failed to load config', 'error')

            }

        }



        async function saveConfig(event) {

            event.preventDefault()

            const url = document.getElementById('webhook-url').value

            if (!url) {

                showAlert('Webhook URL required', 'error')

                return false

            }

            await fetch(`${API_BASE}/merchants/webhook-config`, {

                method: 'POST',

                headers: HEADERS,

                body: JSON.stringify({ webhook_url: url })

            })

            showAlert('Config saved successfully')

            return false

        }



        async function regenerateSecret() {

            const res = await fetch(`${API_BASE}/merchants/regenerate-secret`, {

                method: 'POST',

                headers: HEADERS

            })

            const data = await res.json()

            document.getElementById('webhook-secret').innerText = data.webhook_secret

            showAlert('Secret regenerated')

        }



        async function sendTestWebhook() {

            showAlert('Test webhook sent')

        }



        async function loadLogs() {

            const res = await fetch(`${API_BASE}/webhooks?limit=20&offset=0`, { headers: HEADERS })

            const { data } = await res.json()

            const body = document.getElementById('webhook-logs-body')

            if (!data.length) {

                body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#94a3b8">No logs yet</td></tr>'

                return

            }

            body.innerHTML = data.map(log => `

<tr>

<td>${log.event}</td>

<td>
<span class="status-badge status-${log.status}">
${log.status}
</span>
</td>

<td>${log.attempts || 0}</td>

<td>${log.last_attempt_at ? new Date(log.last_attempt_at).toLocaleString() : '-'}</td>

<td>${log.response_code || '-'}</td>

<td>
<button class="btn btn-secondary"
onclick="retryWebhook('${log.id}')">
Retry
</button>
</td>

</tr>

`).join('')

        }



        async function retryWebhook(id) {

            await fetch(`${API_BASE}/webhooks/${id}/retry`, {

                method: 'POST',

                headers: HEADERS

            })

            loadLogs()

        }



        loadConfig()

        loadLogs()

        setInterval(loadLogs, 5000)

    </script>


</body>

</html>
