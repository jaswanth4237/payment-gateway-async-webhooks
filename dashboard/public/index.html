<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | Payment Dashboard</title>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #334155;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #6366f1;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>Payment Gateway</h1>
        <p style="color: #94a3b8; margin-bottom: 30px;">Merchant Dashboard Login</p>
        <input type="email" placeholder="Email" value="test@example.com">
        <input type="password" placeholder="Password" value="password">
        <button onclick="window.location.href='/dashboard/docs'">Login</button>
    </div>
</body>

</html>
